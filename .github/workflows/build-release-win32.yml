name: Build OrcOutFit Win32
# run-name (приоритет):
# 1) release — сначала название релиза, иначе tag_name;
# 2) workflow_dispatch — временно «manual · ветка (#run)», затем шаг Rename run
#    обновляет имя на «manual · ветка · Commit <short_sha> <message> (#run)»;
# 3) иначе — ветка (#run).
# Автозапуск по push в main отключён — только workflow_dispatch и release.
run-name: ${{ github.event_name == 'release' && (github.event.release.name || github.event.release.tag_name) || github.event_name == 'workflow_dispatch' && format('manual · {0} (#{1})', github.ref_name, github.run_number) || format('{0} (#{1})', github.ref_name, github.run_number) }}

on:
  workflow_dispatch:
  release:
    types:
      - published

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  actions: write
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Rename workflow run (manual)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = context.ref.replace("refs/heads/", "");
            const shortSha = context.sha.substring(0, 7);
            const commit = await github.rest.repos.getCommit({
              owner,
              repo,
              ref: context.sha
            });
            const rawMessage = (commit.data?.commit?.message || "").trim();
            const subject = (rawMessage.split("\n")[0] || "manual dispatch").trim();
            const runName = `manual · ${ref} · Commit ${shortSha} ${subject} (#${context.runNumber})`;
            try {
              await github.rest.actions.getWorkflowRun({
                owner,
                repo,
                run_id: context.runId
              });
            } catch (error) {
              const status = error?.status || "unknown";
              if (status === 403 || status === 404) {
                core.info(`Skipping workflow run rename (status: ${status}) - token cannot access this run.`);
                return;
              }
              core.warning(`Unexpected error while checking workflow run access (status: ${status}).`);
              core.info(error?.message || String(error));
              return;
            }

            try {
              await github.request("PATCH /repos/{owner}/{repo}/actions/runs/{run_id}", {
                owner,
                repo,
                run_id: context.runId,
                name: runName
              });
              core.info(`Workflow run renamed to: ${runName}`);
            } catch (error) {
              const status = error?.status || "unknown";
              if (status === 403 || status === 404) {
                core.info(`Skipping workflow run rename (status: ${status}) - patch is not allowed.`);
                return;
              }
              core.warning(`Failed to rename workflow run (status: ${status}). Keeping default run-name.`);
              core.info(error?.message || String(error));
            }

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build static OpenAL Soft (Win32)
        shell: pwsh
        env:
          ORC_OPENAL_TOOLSET: v143
        run: .\.github\scripts\build-openal-soft.ps1 -Configuration Release

      - name: Build plugin-sdk Plugin.lib
        shell: pwsh
        run: |
          $env:PLUGIN_SDK_DIR = "$PWD/source/external/plugin-sdk"
          msbuild source/external/plugin-sdk/plugin_sa/Plugin_SA.vcxproj /t:Build "/p:Configuration=Release;Platform=Win32;PlatformToolset=v143"

      - name: Build Release Win32
        shell: pwsh
        run: msbuild OrcOutFit.sln /t:Build "/p:Configuration=Release;Platform=x86;PlatformToolset=v143" /p:OrcOpenAlSkipPreBuild=true

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrcOutFit-Release-Win32
          path: build/Release/OrcOutFit.asi
          if-no-files-found: error
          retention-days: 30

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: build/Release/OrcOutFit.asi
