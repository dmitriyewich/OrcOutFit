name: Build OrcOutFit Win32
# run-name (приоритет):
# 1) release — сначала название релиза, иначе tag_name;
# 2) push в main — head_commit.message · ветка (#run); в выражениях GHA нет replace() — многострочные
#    сообщения могут дать перенос в заголовке run (ограничение платформы).
# 3) workflow_dispatch — у payload нет head_commit: «manual · ветка · полный SHA (#run)»;
# 4) иначе — ветка (#run).
run-name: ${{ github.event_name == 'release' && (github.event.release.name || github.event.release.tag_name) || github.event_name == 'push' && github.event.head_commit && github.event.head_commit.message && format('{0} · {1} (#{2})', github.event.head_commit.message, github.ref_name, github.run_number) || github.event_name == 'workflow_dispatch' && format('manual · {0} · {1} (#{2})', github.ref_name, github.sha, github.run_number) || format('{0} (#{1})', github.ref_name, github.run_number) }}

on:
  workflow_dispatch:
  release:
    types:
      - published
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build plugin-sdk Plugin.lib
        shell: pwsh
        run: |
          $env:PLUGIN_SDK_DIR = "$PWD/source/external/plugin-sdk"
          msbuild source/external/plugin-sdk/plugin_sa/Plugin_SA.vcxproj /t:Build "/p:Configuration=Release;Platform=Win32;PlatformToolset=v143"

      - name: Build Release Win32
        shell: pwsh
        run: msbuild OrcOutFit.sln /t:Build "/p:Configuration=Release;Platform=x86;PlatformToolset=v143"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrcOutFit-Release-Win32
          path: build/Release/OrcOutFit.asi
          if-no-files-found: error
          retention-days: 30

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: build/Release/OrcOutFit.asi
